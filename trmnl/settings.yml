---
strategy: polling
no_screen_padding: "no"
dark_mode: "no"
static_data: ""
polling_verb: get
polling_url: "https://forex.rabbitmonitor.com/v1/rates/{{ base_currency | upcase }}\r\nhttps://forex.rabbitmonitor.com/v1/metals/rates/{{ base_currency | upcase }}\r\nhttps://forex.rabbitmonitor.com/v1/crypto/rates/{{ base_currency | upcase }}\r\nhttps://forex.rabbitmonitor.com/v1/stocks/rates/{{ base_currency | upcase }}\r\n{% assign _f = fiat_assets | default: '' | split: ',' | first | default: '' | strip %}{% assign _m = metal_assets | default: '' | split: ',' | first | default: '' | strip %}{% assign _c = crypto_assets | default: '' | split: ',' | first | default: '' | strip %}{% assign _s = stock_assets | default: '' | split: ',' | first | default: '' | strip %}{% assign range = trmnl.plugin_settings.custom_fields_values.history_range | default: '30_days' %}{% if range == '1_day' or range == '7_days' %}{% assign resolution = 'hourly' %}{% else %}{% assign resolution = 'daily' %}{% endif %}{% if _f != '' %}https://forex.rabbitmonitor.com/v1/rates/history/{{ _f | upcase }}/{{ resolution }}{% elsif _m != '' %}https://forex.rabbitmonitor.com/v1/metals/history/{{ _m | upcase }}/currency/{{ base_currency | upcase }}/{{ resolution }}{% elsif _c != '' %}https://forex.rabbitmonitor.com/v1/crypto/history/{{ _c | upcase }}/currency/{{ base_currency | upcase }}/{{ resolution }}{% elsif _s != '' %}https://forex.rabbitmonitor.com/v1/stocks/history/{{ _s | upcase }}/currency/{{ base_currency | upcase }}/{{ resolution }}{% else %}https://forex.rabbitmonitor.com/v1/rates/history/EUR/daily{% endif %}"
polling_headers: ""
polling_body: ""
id: 182766
